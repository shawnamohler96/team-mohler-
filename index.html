<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martial Arts in Grapevine, TX  Team Mohler BJJ, Boxing</title>
    <link rel="icon" type="image/jpeg" href="/mohler_logo_white_copy.jpeg" />
    <link rel="apple-touch-icon" href="/mohler_logo_white_copy.jpeg" />
    <meta name="description" content="Texas's premier 13,000 sqft academy! Led by Professor Mohler (30+ years exp), Beginner-friendly BJJ, Boxing, & MMA for all ages. Start your free trial today!" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to refresh the page.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms registration -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="program"></select>
      <textarea name="schedule"></textarea>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
